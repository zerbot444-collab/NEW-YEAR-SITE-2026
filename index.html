<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 සිංහල හා දෙමළ අලුත් අවුරුදු නැකැත්</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #1a0b0c; /* Deep dark red/brown */
            --card-bg: rgba(45, 15, 18, 0.8);
            --gold: #FFD700;
            --gold-hover: #ffea70;
            --text-light: #ffffff;
            --text-muted: #dcdcdc;
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Sinhala', 'Noto Sans Tamil', sans-serif;
            background: linear-gradient(135deg, #2a080c 0%, #110505 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevent scrollbar from animation */
            position: relative;
            /* Hide scrollbar during welcome screen */
            overflow-y: hidden; 
        }

        /* -------------------------------------------
           WELCOME SCREEN (NEW)
        ------------------------------------------- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #110505 0%, #3a0d14 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
        }

        .welcome-title {
            font-size: clamp(3rem, 8vw, 5rem);
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
            animation: popIn 1s ease forwards;
            opacity: 0;
        }

        .welcome-site-name {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #ffffff;
            margin-bottom: 10px;
            animation: popIn 1s ease forwards 0.3s;
            opacity: 0;
        }

        .welcome-desc {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--text-muted);
            margin-bottom: 40px;
            animation: popIn 1s ease forwards 0.6s;
            opacity: 0;
        }

        .enter-btn {
            background: var(--gold);
            color: var(--primary-bg);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
            transition: 0.3s;
            animation: popIn 1s ease forwards 0.9s, pulseBtn 2s infinite 1.5s;
            opacity: 0;
        }

        .enter-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.6);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* MAIN CONTENT WRAPPER FOR ANIMATION */
        #main-wrapper {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.77, 0, 0.175, 1);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ANIMATION TRIGGERS WHEN 'site-loaded' CLASS IS ADDED TO BODY */
        body.site-loaded {
            overflow-y: auto; /* Enable scroll again */
        }
        
        body.site-loaded #welcome-screen {
            transform: translateY(-100vh); /* Curtain up effect */
            opacity: 0;
            pointer-events: none;
        }

        body.site-loaded #main-wrapper {
            opacity: 1;
            transform: scale(1);
        }

        /* -------------------------------------------
           EXISTING CSS (Unchanged)
        ------------------------------------------- */

        /* BACKGROUND ANIMATION (KAUM, KOKIS) */
        .bg-sweets {
            position: fixed;
            top: -100px;
            z-index: -1;
            user-select: none;
            pointer-events: none;
            opacity: 0.15; /* Subtle background effect */
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.2;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* HEADER SECTION */
        header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        /* LANGUAGE TOGGLE */
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 24px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .lang-btn.active, .lang-btn:hover {
            background: var(--gold);
            color: var(--primary-bg);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* GRID LAYOUT */
        main {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* CARDS */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0;
            transition: 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card h3 {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card p.time-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        /* STATUS BADGE */
        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-upcoming {
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
        }

        .status-passed {
            background: rgba(0, 230, 118, 0.2);
            color: var(--success);
        }

        /* COMPLETED CARD ANIMATION */
        .card.passed {
            border-color: rgba(0, 230, 118, 0.3);
            background: rgba(10, 40, 20, 0.4);
        }
        
        .card.passed:hover {
            border-color: rgba(0, 230, 118, 0.6);
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.15);
        }

        /* MODAL (POPUP) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #2a080c, #1a0b0c);
            border: 1px solid var(--gold);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 1.6rem;
        }

        .modal-content p.desc {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        /* COUNTDOWN DISPLAY */
        .countdown-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .countdown-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            font-family: 'Poppins', sans-serif;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-light);
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-light);
        }

        /* MUSIC BUTTON */
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--gold);
            color: var(--primary-bg);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .music-btn:hover {
            transform: scale(1.1);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 60px; /* Space for the music button */
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid-container { grid-template-columns: 1fr; }
            .countdown-text { font-size: 1.4rem; }
        }
    </style>
</head>

                desc: {
                    si: "අප්‍රේල් 20 සඳුදා උදේ 6:27 ට සුදු පැහැති වස්ත්‍රාභරණයෙන් සැරසී දකුණු දිශාව බලා රැකියාව සඳහා පිටත්ව යන්න.",
                    ta: "ஏப்ரல் 20 திங்கட்கிழமை காலை 6:27 மணிக்கு வெள்ளை ஆடை அணிந்து தெற்கு திசை நோக்கி வேலைக்குச் செல்லவும்."
                }
            },
            {
                time: "2026-04-23T09:01:00+05:30",
                title: { si: "පැළ සිටුවීම", ta: "மரம் நடுதல்" },
                desc: {
                    si: "අප්‍රේල් 23 බ්‍රහස්පතින්දා උදේ 9:01 ට රන්වන් පැහැති වස්ත්‍රාභරණයෙන් සැරසී උතුරු දිශාව බලා පැළ සිටුවන්න.",
                    ta: "ஏப்ரல் 23 வியாழக்கிழமை காலை 9:01 மணிக்கு பொன்னிற ஆடை அணிந்து வடக்கு திசை நோக்கி மரம் நடவும்."
                }
            }
        ];

        let currentLang = "si";
        let countdownInterval;

        // Function to get current time accurately
        function getCurrentTime() {
            return new Date().getTime();
        }

        // Format Date to readable format
        function formatDateTime(isoString) {
            const dateObj = new Date(isoString);
            return dateObj.toLocaleString("en-US", { 
                timeZone: "Asia/Colombo", 
                month: "short", 
                day: "numeric", 
                hour: "2-digit", 
                minute: "2-digit",
                hour12: true
            });
        }

        // Render Cards to the DOM
        function renderCards() {
            const container = document.getElementById("cards-container");
            container.innerHTML = "";
            
            const now = getCurrentTime();

            nakathData.forEach((item, index) => {
                const targetTime = new Date(item.time).getTime();
                const isPassed = now > targetTime;

                // Translations
                const title = item.title[currentLang];
                const displayTime = formatDateTime(item.time);
                
                const badgeText = isPassed 
                    ? (currentLang === 'si' ? "පසු විය" : "முடிந்தது") 
                    : (currentLang === 'si' ? "ඉදිරියට" : "வரவிருக்கும்");
                
                const badgeClass = isPassed ? "status-passed" : "status-upcoming";
                const cardClass = isPassed ? "card passed" : "card";

                const cardHTML = `
                    <div class="${cardClass}" onclick="openModal(${index})">
                        <h3>
                            ${title} 
                            <span class="status-badge ${badgeClass}">${badgeClass === 'status-passed' ? '✔' : '⏳'} ${badgeText}</span>
                        </h3>
                        <p class="time-text">🗓️ ${displayTime}</p>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            // Update Main Title
            document.getElementById("main-title").innerText = currentLang === "si" 
                ? "🎉 2026 අලුත් අවුරුදු නැකැත් 🎉" 
                : "🎉 2026 புத்தாண்டு சுப நேரங்கள் 🎉";
        }

        // Open Modal and Start Countdown
        function openModal(index) {
            clearInterval(countdownInterval);
            
            const item = nakathData[index];
            document.getElementById("modal-title").innerText = item.title[currentLang];
            document.getElementById("modal-desc").innerText = item.desc[currentLang];
            
            const targetTime = new Date(item.time).getTime();
            const countdownEl = document.getElementById("modal-countdown");

            const updateTimer = () => {
                const now = getCurrentTime();
                const distance = targetTime - now;

                if (distance <= 0) {
                    clearInterval(countdownInterval);
                    countdownEl.innerHTML = currentLang === 'si' ? "මෙම නැකත පසු වී ඇත ✅" : "இந்த நேரம் கடந்துவிட்டது ✅";
                    countdownEl.style.color = "var(--success)";
                    renderCards(); // Refresh grid to update passed status
                    return;
                }

                countdownEl.style.color = "var(--gold)";
                
                // Time calculations
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdownEl.innerHTML = `${days}d : ${String(hours).padStart(2, '0')}h : ${String(minutes).padStart(2, '0')}m : ${String(seconds).padStart(2, '0')}s`;
            };

            document.getElementById("modal").style.display = "flex";
            updateTimer(); // Run once immediately
            countdownInterval = setInterval(updateTimer, 1000);
        }

        // Close Modal
        function closeModal() {
            clearInterval(countdownInterval);
            document.getElementById("modal").style.display = "none";
        }

        // Switch Language
        function setLang(lang) {
            currentLang = lang;
            
            // Update button styles
            document.getElementById("btn-si").classList.toggle("active", lang === 'si');
            document.getElementById("btn-ta").classList.toggle("active", lang === 'ta');

            renderCards();
        }

        // Close modal when clicking outside the box
        window.onclick = function(event) {
            const modal = document.getElementById("modal");
            if (event.target === modal) {
                closeModal();
            }
        }

        // CREATE BACKGROUND ANIMATION (KAVUM, KOKIS, BANANA, HONEY)
        function createBackgroundSweets() {
            // Emojis representing Kokis(🏵️), Kavum(🥮), Honey(🍯), Banana(🍌)
            const sweetsArr = ['🏵️', '🥮', '🍯', '🍌', '🍂'];
            const body = document.querySelector('body');
            
            // Generate 25 floating items
            for (let i = 0; i < 25; i++) {
                let sweet = document.createElement('div');
                sweet.classList.add('bg-sweets');
                sweet.innerText = sweetsArr[Math.floor(Math.random() * sweetsArr.length)];
                
                // Randomize position, animation duration, delay, and size
                let leftPos = Math.random() * 100;
                let animDuration = 10 + Math.random() * 20; // Falls between 10s and 30s
                let delay = Math.random() * 15; // Random delay so they don't fall together
                let fontSize = 1.5 + Math.random() * 1.5; // Random size

                sweet.style.left = leftPos + 'vw';
                sweet.style.animationDuration = animDuration + 's';
                sweet.style.animationDelay = delay + 's';
                sweet.style.fontSize = fontSize + 'rem';

                body.appendChild(sweet);
            }
        }

        // MUSIC CONTROLS LOGIC
        let isMusicPlaying = false;
        const bgMusic = document.getElementById("bg-music");
        const musicBtn = document.getElementById("music-toggle");

        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.innerText = "🔇";
            } else {
                bgMusic.play();
                musicBtn.innerText = "🎵";
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // Initialize App
        renderCards();
        createBackgroundSweets();

        // Auto refresh UI every minute to check if a nakath has passed
        setInterval(renderCards, 60000);

    </script>
</body>
</html>
